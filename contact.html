<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitix Digital — Contact</title>
<meta name="description" content="Contact Cognitix Digital via WhatsApp: send your brief and project details.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="siteHeader">
  <nav class="wrap">
    <div class="logo">
      <img class="brand-logo" src="assets/images/brand_logo_1.png" alt="Cognitix Digital logo" />
    </div>
    <div class="navlinks" id="navLinks">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="work.html">Work</a>
      <a href="process.html">Process</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>

    </div>
    <div class="nav-cta">
      <a class="btn btn-whatsapp" href="https://wa.me/254705557706" target="_blank" rel="noopener"><span class="btn-text">Chat on WhatsApp</span><span aria-hidden="true">→</span></a>
      <button class="burger" id="burger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
</header>

<main class="page-content">

<section class="contact" id="contact">
  <div class="blob blob-1" style="background:var(--mint); top:-200px; right:-150px;"></div>
  <div class="blob blob-2" style="background:var(--pink);"></div>
  <div class="wrap">
    <div class="section-head reveal" style="margin-bottom:0;">
      <span class="eyebrow">GET IN TOUCH</span>
      <h2>Let's build something.</h2>
    </div>
    <div class="contact-grid">
      <form class="contact-form reveal" id="contactForm">
        <div class="form-row">
          <div>
            <label for="name">Your name</label>
            <input type="text" id="name" placeholder="e.g. Wanjiru Kamau" required>
          </div>
          <div>
            <label for="phone">Phone or email</label>
            <input type="text" id="phone" placeholder="07XX XXX XXX or email" required>
          </div>
        </div>
        <div class="form-row">
          <div>
            <label for="service">What do you need?</label>
            <select id="service">
              <option value="Graphic design">Graphic design</option>
              <option value="Web / software development">Web / software development</option>
              <option value="Both design and development">Both design &amp; development</option>
              <option value="Not sure yet">Not sure yet</option>
            </select>
          </div>
          <div>
            <label for="budget">Estimated budget (optional)</label>
            <select id="budget">
              <option value="">Prefer not to say</option>
              <option value="Under KSh 10,000">Under KSh 10,000</option>
              <option value="KSh 10,000 – 30,000">KSh 10,000 – 30,000</option>
              <option value="KSh 30,000 – 100,000">KSh 30,000 – 100,000</option>
              <option value="KSh 100,000+">KSh 100,000+</option>
            </select>
          </div>
        </div>
        <div>
          <label for="details">Project details</label>
          <textarea id="details" placeholder="Tell me a bit about what you're trying to do..." required></textarea>
        </div>
        <button type="submit" class="btn btn-whatsapp" style="align-self:flex-start;">Send via WhatsApp →</button>
        <p class="form-note">This opens WhatsApp with your message ready to send — nothing is sent until you tap send there.</p>
      </form>

      <div class="contact-card reveal">
        <h3>Prefer to just chat?</h3>
        <p>Skip the form and message directly on WhatsApp.</p>
        <span class="whatsapp-number">+254 705 557 706</span>
        <a class="btn btn-whatsapp" href="https://wa.me/254705557706" target="_blank" rel="noopener" style="width:100%; justify-content:center;">Open WhatsApp</a>
      </div>
    </div>
  </div>
</section>


<script src="js/script.js"></script>


</body>
</html>
